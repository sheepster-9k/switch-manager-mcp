name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify config.yaml version matches tag
        run: |
          config_version=$(grep '^version:' switch_manager_mcp/config.yaml | sed 's/version: *"\(.*\)"/\1/')
          if [ "$config_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::config.yaml version ($config_version) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Extract changelog for this version
        run: |
          version="${{ steps.version.outputs.version }}"
          # Extract section between this version header and the next, drop both headers
          awk "/^## ${version}/,/^## [0-9]/" CHANGELOG.md | grep -v "^## " > /tmp/release_body.md
          echo "--- Extracted release notes ---"
          cat /tmp/release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          body_path: /tmp/release_body.md
          draft: false
          prerelease: false
